server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: Movie-backend
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=Movie;encrypt=true;trustServerCertificate=true
    username: Web
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  
flask:
  api:
    url: http://localhost:5000
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true